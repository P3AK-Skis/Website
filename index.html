document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x;\">01 / Explore<\u002Fdiv>\n          <p style=\"margin:0;font-size:16px;line-height:1.6;color:var(--ink2);\">More terrain, more confidence. Skis that open up the parts of the mountain you used to skip.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"animation:revealUp both cubic-bezier(.16,1,.3,1);animation-timeline:view();animation-range:entry 6% entry 64%;\">\n          <div style=\"font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:14px;\">02 / Progress<\u002Fdiv>\n          <p style=\"margin:0;font-size:16px;line-height:1.6;color:var(--ink2);\">Forgiving where you need it, lively where you want it. Designed to meet you and then push you further.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"animation:revealUp both cubic-bezier(.16,1,.3,1);animation-timeline:view();animation-range:entry 12% entry 68%;\">\n          <div style=\"font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:14px;\">03 / Craft<\u002Fdiv>\n          <p style=\"margin:0;font-size:16px;line-height:1.6;color:var(--ink2);\">Handmade in small batches. Each pair built with care, not churned out by the thousand.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"max-width:900px;margin:0 auto;padding:110px 40px;text-align:center;\">\n      <h2 style=\"margin:0 0 30px;font-weight:800;font-size:clamp(30px,4.4vw,58px);line-height:1.02;letter-spacing:-.02em;text-wrap:balance;animation:revealUp both cubic-bezier(.16,1,.3,1);animation-timeline:view();animation-range:entry 0% entry 55%;\">The mountain is big. Your ski shouldn't hold you back.<\u002Fh2>\n      <button onclick=\"{{ goShop }}\" style=\"background:var(--accent);color:var(--on-accent);border:0;border-radius:46px;font-family:var(--sans);font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;padding:17px 34px;cursor:pointer;transition:transform .3s;\" style-hover=\"transform:translateY(-3px)\">Meet Summit V1<\u002Fbutton>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isContact }}\" hint-placeholder-val=\"{{ true }}\">\n  <main data-screen-label=\"Contact\" style=\"animation:introUp .6s cubic-bezier(.16,1,.3,1) both;max-width:1180px;margin:0 auto;padding:80px 40px 120px;\">\n    <div style=\"margin-bottom:54px;\">\n      <p style=\"font-family:var(--mono);font-size:12px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;margin:0 0 14px;\">Get in touch<\u002Fp>\n      <h1 style=\"margin:0;font-weight:800;font-size:clamp(40px,6.5vw,90px);line-height:.92;letter-spacing:-.025em;text-transform:uppercase;\">Let's talk lines<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.2fr .8fr;gap:60px;align-items:start;\">\n      <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1px solid var(--accent);border-radius:20px;padding:60px 40px;text-align:center;background:color-mix(in oklab,var(--accent) 8%,var(--panel));\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--on-accent);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 22px;\">✓<\u002Fdiv>\n          <h3 style=\"margin:0 0 10px;font-size:26px;font-weight:800;text-transform:uppercase;\">Message sent<\u002Fh3>\n          <p style=\"margin:0;color:var(--ink2);font-size:16px;\">Thanks for reaching out — we'll get back to you soon. See you on the mountain.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ submit }}\" style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;\">\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <label style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);\">Name<\u002Flabel>\n              <input value=\"{{ name }}\" oninput=\"{{ onName }}\" placeholder=\"Your name\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;font-family:var(--sans);font-size:15px;color:var(--ink);outline:none;transition:border-color .25s;\" style-focus=\"border-color:var(--accent)\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <label style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);\">Email<\u002Flabel>\n              <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"you@email.com\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;font-family:var(--sans);font-size:15px;color:var(--ink);outline:none;transition:border-color .25s;\" style-focus=\"border-color:var(--accent)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <label style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);\">Message<\u002Flabel>\n            <textarea value=\"{{ message }}\" oninput=\"{{ onMsg }}\" rows=\"5\" placeholder=\"Tell us what you're after...\" style=\"background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;font-family:var(--sans);font-size:15px;color:var(--ink);outline:none;resize:vertical;transition:border-color .25s;\" style-focus=\"border-color:var(--accent)\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <button type=\"submit\" style=\"align-self:flex-start;background:var(--ink);color:var(--bg);border:0;border-radius:46px;font-family:var(--sans);font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;padding:16px 34px;cursor:pointer;transition:transform .3s;\" style-hover=\"transform:translateY(-3px)\">Send message<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n      <div style=\"display:flex;flex-direction:column;gap:30px;\">\n        <div>\n          <div style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;\">Email<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;\">hello@p3ak.ca<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;\">Workshop<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:700;\">In the mountains, somewhere high.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px;\">Stay in the loop<\u002Fdiv>\n          <div style=\"font-size:15px;color:var(--ink2);line-height:1.5;max-width:280px;\">Social channels are coming soon — drop us a line and we'll keep you posted on the first run.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <footer style=\"border-top:1px solid var(--line);background:var(--bg2);padding:56px 40px 40px;\">\n    <div style=\"max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:30px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n        <span style=\"display:inline-flex;width:30px;height:30px;border-radius:50%;background:var(--accent);align-items:center;justify-content:center;color:var(--on-accent);font-weight:800;font-size:13px;font-family:var(--mono);\">P<\u002Fspan>\n        <span style=\"font-weight:800;letter-spacing:.2em;font-size:18px;\">P3AK<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:26px;flex-wrap:wrap;\">\n        <button onclick=\"{{ goHome }}\" style=\"background:transparent;border:0;color:var(--ink2);font-family:var(--sans);font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:color .25s;\" style-hover=\"color:var(--accent)\">Home<\u002Fbutton>\n        <button onclick=\"{{ goShop }}\" style=\"background:transparent;border:0;color:var(--ink2);font-family:var(--sans);font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:color .25s;\" style-hover=\"color:var(--accent)\">Shop<\u002Fbutton>\n        <button onclick=\"{{ goAbout }}\" style=\"background:transparent;border:0;color:var(--ink2);font-family:var(--sans);font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:color .25s;\" style-hover=\"color:var(--accent)\">About<\u002Fbutton>\n        <button onclick=\"{{ goContact }}\" style=\"background:transparent;border:0;color:var(--ink2);font-family:var(--sans);font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:color .25s;\" style-hover=\"color:var(--accent)\">Contact<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1240px;margin:36px auto 0;padding-top:24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink2);text-transform:uppercase;\">\n      <span>© 2026 P3AK Skis<\u002Fspan>\n      <span>Explore the mountain<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:820},&quot;mood&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;glacier&quot;,&quot;nightfall&quot;],&quot;default&quot;:&quot;glacier&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;comingSoonCount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;min&quot;:0,&quot;max&quot;:4,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { tab:'home', theme:null, len:'175', name:'', email:'', message:'', sent:false, reserved:false, rName:'', rEmail:'' };\n\n  // ▼▼▼ PASTE YOUR FORMSPREE ENDPOINT HERE (sign up free at https://formspree.io) ▼▼▼\n  formEndpoint = 'https://formspree.io/f/xaqgeazq';\n  send(data){\n    try {\n      fetch(this.formEndpoint, {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n        body: JSON.stringify(data)\n      }).catch(()=>{});\n    } catch (e) {}\n  }\n\n  setTab(t){\n    this.setState({ tab:t });\n    requestAnimationFrame(()=>{ try{ window.scrollTo({ top:0, behavior:'smooth' }); }catch(e){ window.scrollTo(0,0); } });\n  }\n  toggleTheme(){\n    const cur = this.state.theme ?? (this.props.mood || 'glacier');\n    this.setState({ theme: cur === 'glacier' ? 'nightfall' : 'glacier' });\n  }\n\n  renderVals(){\n    const theme = this.state.theme ?? (this.props.mood || 'glacier');\n    const tab = this.state.tab;\n    const n = Math.max(0, this.props.comingSoonCount ?? 2);\n    const mdata = [\n      { name:'Kicker',  img:'assets/ski-kicker.png' },\n      { name:'Couloir', img:'assets/ski-couloir.png' },\n      { name:'Meadow',  img:'' },\n      { name:'Spine',   img:'' }\n    ];\n    const models = Array.from({ length:n }, (_,i)=>{\n      const d = mdata[i] || { name:'', img:'' };\n      return { n: String(i+2).padStart(2,'0'), name: d.name, img: d.img, noImg: !d.img };\n    });\n    const lens = ['175'].map(v=>({\n      v, on: this.state.len === v ? 'true' : 'false', set:()=>this.setState({ len:v })\n    }));\n    return {\n      theme,\n      reduce: this.props.reduceMotion ? 'true' : 'false',\n      tab,\n      isHome: tab==='home', isShop: tab==='shop', isAbout: tab==='about', isContact: tab==='contact',\n      goHome:()=>this.setTab('home'), goShop:()=>this.setTab('shop'),\n      goAbout:()=>this.setTab('about'), goContact:()=>this.setTab('contact'),\n      toggleTheme:()=>this.toggleTheme(),\n      themeLabel: theme==='glacier' ? 'Nightfall' : 'Glacier',\n      models: models,\n      lengths: lens,\n      price: 599,\n      reserved: this.state.reserved,\n      notReserved: !this.state.reserved,\n      rName: this.state.rName, rEmail: this.state.rEmail,\n      rNameComma: this.state.rName ? (', ' + this.state.rName.trim()) : '',\n      onRName:(e)=>this.setState({ rName:e.target.value }),\n      onREmail:(e)=>this.setState({ rEmail:e.target.value }),\n      submitReserve:(e)=>{ if(e && e.preventDefault) e.preventDefault();\n        this.send({ _subject:'P3AK pre-order — Summit V1', form:'Pre-order', product:'Summit V1', length:(this.state.len+' cm'), name:this.state.rName, email:this.state.rEmail });\n        this.setState({ reserved:true });\n      },\n      name: this.state.name, email: this.state.email, message: this.state.message,\n      onName:(e)=>this.setState({ name:e.target.value }),\n      onEmail:(e)=>this.setState({ email:e.target.value }),\n      onMsg:(e)=>this.setState({ message:e.target.value }),\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      submit:(e)=>{ if(e && e.preventDefault) e.preventDefault();\n        this.send({ _subject:'P3AK contact form', form:'Contact', name:this.state.name, email:this.state.email, message:this.state.message });\n        this.setState({ sent:true });\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
